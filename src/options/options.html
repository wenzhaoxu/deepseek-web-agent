<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, initial-scale=1.0">
  <title>管理指令 - DeepSeek 助手</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <h2 class="sidebar-title">分类</h2>
      <ul class="category-tree" id="categoryTree"></ul>
      <button id="addCategoryBtn" class="btn btn-default btn-sm sidebar-btn">+ 添加分类</button>
    </aside>

    <!-- Right Main -->
    <main class="main-content">
      <!-- Top toolbar -->
      <div class="toolbar" id="toolbar">
        <div class="toolbar-left">
          <h3 id="currentCategoryTitle">全部指令</h3>
        </div>
        <div class="toolbar-right">
          <button id="importBtn" class="btn btn-default btn-sm">导入</button>
          <button id="exportBtn" class="btn btn-default btn-sm">导出</button>
          <button id="restoreBtn" class="btn btn-default btn-sm">恢复默认</button>
          <button id="batchEnableBtn" class="btn btn-default btn-sm">批量启用</button>
          <button id="batchDisableBtn" class="btn btn-default btn-sm">批量禁用</button>
        </div>
      </div>

      <!-- Instruction Table -->
      <div class="table-container">
        <table class="instruction-table">
          <thead>
            <tr>
              <th class="col-drag"></th>
              <th class="col-title">标题</th>
              <th class="col-preview">内容预览</th>
              <th class="col-category">分类</th>
              <th class="col-enabled">启用</th>
              <th class="col-actions">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state">暂无指令。点击"恢复默认"加载默认指令。</div>
        <div id="categoryEmptyState" class="empty-state" style="display:none">该分类下无指令</div>
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <h3 id="modalTitle">编辑指令</h3>
      <form id="editForm">
        <div class="form-group">
          <label for="editTitle">标题</label>
          <input type="text" id="editTitle" required>
        </div>
        <div class="form-group">
          <label for="editText">内容</label>
          <textarea id="editText" rows="4" required></textarea>
        </div>
        <div class="form-group">
          <label for="editCategory">分类</label>
          <input type="text" id="editCategory" list="categoryList">
          <datalist id="categoryList"></datalist>
        </div>
        <div class="form-group-inline">
<label>
            <input type="checkbox" id="editShowInContextMenu"> 显示在右键菜单
          </label>
        </div>
        <div class="form-group-inline">
          <label>
            <input type="checkbox" id="editEnabled" checked> 启用
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-default" id="modalCancelBtn">取消</button>
          <button type="submit" class="btn btn-primary" id="modalSaveBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320, initial-scale=1.0">
  <title>DeepSeek Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <!-- ===== Tab Navigation ===== -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="commands">指令</button>
      <button class="tab-btn" data-tab="goal">目标</button>
    </div>

    <div id="commands-panel" class="panel">

    <!-- ===== Status Bar ===== -->
    <div id="status-bar" class="status-bar status-bar--idle">
      <span id="status-icon">🟢</span>
      <span id="status-text">可输入</span>
      <span class="status-dots" id="status-dots" style="display:none">…</span>
    </div>

    <!-- ===== Search Box ===== -->
    <div class="search-box">
      <input type="search" id="search-input" placeholder="搜索指令...">
    </div>

    <!-- ===== Instruction List ===== -->
    <div id="instruction-list" class="instruction-list">

      <!-- 通用 -->
      <details open>
        <summary>通用</summary>
        <div class="instruction-item" data-id="1">
          <span class="instruction-item__title">总结内容</span>        </div>
      </details>

      <!-- 语言 -->
      <details>
        <summary>语言</summary>
        <div class="instruction-item" data-id="2">
          <span class="instruction-item__title">翻译为英文</span>        </div>
        <div class="instruction-item" data-id="7">
          <span class="instruction-item__title">修复语法错误</span>        </div>
      </details>

      <!-- 编程 -->
      <details>
        <summary>编程</summary>
        <div class="instruction-item" data-id="3">
          <span class="instruction-item__title">解释代码</span>        </div>
      </details>

      <!-- 写作 -->
      <details>
        <summary>写作</summary>
        <div class="instruction-item" data-id="4">
          <span class="instruction-item__title">改写更正式</span>        </div>
      </details>

      <!-- 办公 -->
      <details>
        <summary>办公</summary>
        <div class="instruction-item" data-id="5">
          <span class="instruction-item__title">生成周报摘要</span>        </div>
        <div class="instruction-item" data-id="10">
          <span class="instruction-item__title">起草邮件回复</span>        </div>
      </details>

      <!-- 创意 -->
      <details>
        <summary>创意</summary>
        <div class="instruction-item" data-id="6">
          <span class="instruction-item__title">头脑风暴</span>        </div>
      </details>

      <!-- 工具 -->
      <details>
        <summary>工具</summary>
        <div class="instruction-item" data-id="8">
          <span class="instruction-item__title">转换为Markdown</span>        </div>
      </details>

      <!-- 学习 -->
      <details>
        <summary>学习</summary>
        <div class="instruction-item" data-id="9">
          <span class="instruction-item__title">解释专业术语</span>        </div>
      </details>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state" style="display:none">
        无匹配指令
      </div>
    </div>

    <!-- ===== Toolbar ===== -->
    <div id="toolbar" class="toolbar">
      <button id="open-deepseek">打开 DeepSeek</button>
      <button id="manage-instructions">管理指令</button>
    </div>
    </div>

    <!-- ===== Goal Panel ===== -->
    <div id="goal-panel" class="panel" style="display:none;">
      <!-- Goal content will be rendered by JS -->
    </div>

  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
